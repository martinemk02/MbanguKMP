scripts:
  - name: Fix permissions
    script: chmod +x gradlew
  - name: Build Kotlin Framework
    script: |
      # On nettoie et on compile uniquement ce qui est vital
      ./gradlew :composeApp:assembleDebug \
        -Pkotlin.native.ignoreDisabledTargets=true \
        -Pcompose.ios.resources.targetArchs="arm64;x86_64" \
        --no-daemon --stacktrace
  - name: Build iOS App
    script: |
      xcodebuild -project iosApp/iosApp.xcodeproj \
        -scheme iosApp \
        -configuration Debug \
        -sdk iphonesimulator \
        -destination 'platform=iOS Simulator,name=iPhone 15' \
        build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

workflows:
  ios-kmp-workflow:
    name: Build iOS MbanguKMP
    instance_type: mac_mini_m2
    scripts:
      - name: Fix permissions
        script: chmod +x gradlew
      - name: Xcode Build
        script: |
          # On lance directement Xcode. 
          # Xcode appellera Gradle automatiquement pour les ressources et le framework.
          xcodebuild -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER="com.votre.nom.mbangukmp"
    artifacts:
      - iosApp/build/Release-iphonesimulator/*.app
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app

